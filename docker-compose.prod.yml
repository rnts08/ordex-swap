version: '3.8'

services:
  ordex-swap:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_TEST: "false"
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - app/.env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ordex-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ordex-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "127.0.0.1:8080:80"
    restart: unless-stopped
    networks:
      - ordex-net

volumes:
  ordex-data:

networks:
  ordex-net:
    driver: bridge